name: Deploy research site and demos to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "research-site/index.html"
      - "research-site/styles.css"
      - "research-site/app.js"
      - "research-site/apps-script/**"
      - "apps/camera-ar-gomi-demo/**"
      - "apps/local-map-gps-demo/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/camera-ar-gomi-demo/package-lock.json
            apps/local-map-gps-demo/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build camera AR demo
        working-directory: apps/camera-ar-gomi-demo
        run: |
          npm ci
          npm run build

      - name: Build local map GPS demo
        working-directory: apps/local-map-gps-demo
        run: |
          npm ci
          npm run build

      - name: Prepare static files
        env:
          RESEARCH_SITE_DATA_API_URL: ${{ vars.RESEARCH_SITE_DATA_API_URL }}
        run: |
          if [ -z "$RESEARCH_SITE_DATA_API_URL" ]; then
            echo "::error::Repository variable RESEARCH_SITE_DATA_API_URL is not set."
            exit 1
          fi

          rm -rf public
          mkdir public
          cp research-site/index.html public/index.html
          cp research-site/styles.css public/styles.css
          cp research-site/app.js public/app.js
          touch public/.nojekyll

          mkdir -p public/camera-ar-gomi-demo
          cp -r apps/camera-ar-gomi-demo/dist/. public/camera-ar-gomi-demo/

          mkdir -p public/local-map-gps-demo
          cp -r apps/local-map-gps-demo/dist/. public/local-map-gps-demo/

          sed -i "s|__RESEARCH_SITE_DATA_API_URL__|${RESEARCH_SITE_DATA_API_URL}|g" public/index.html

          if grep -q "__RESEARCH_SITE_DATA_API_URL__" public/index.html; then
            echo "::error::Failed to replace RESEARCH_SITE_DATA_API_URL placeholder."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
        with:
          timeout: 600000
          error_count: 10
          reporting_interval: 5000

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 10
          reporting_interval: 5000

      - name: Fail if deploy did not succeed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome != 'success'
        run: exit 1
