<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>リサーチまとめサイト</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main
      id="appRoot"
      class="page-shell"
      data-csv-url="https://docs.google.com/spreadsheets/d/1YJvTTgZVr9lKFffyKpsqkbbNWuNzyMDlao0iZhgF8t0/export?format=csv&amp;gid=0"
    >
      <header class="site-header">
        <div class="site-header__text">
          <p class="eyebrow">Research Archive</p>
          <h1>リサーチまとめサイト</h1>
          <p class="lead">Google スプレッドシートの公開CSVを読み込んで表示する事例一覧です。</p>
        </div>
        <dl class="data-meta" aria-label="データ取得情報">
          <div>
            <dt>最終取得</dt>
            <dd><time id="lastFetched" datetime="">未取得</time></dd>
          </div>
          <div>
            <dt>データ</dt>
            <dd><a id="csvLink" href="#" target="_blank" rel="noreferrer">公開CSV</a></dd>
          </div>
        </dl>
      </header>

      <section class="filters" aria-label="事例の絞り込み">
        <label class="field field--search">
          <span>キーワード</span>
          <input id="keywordSearch" type="search" autocomplete="off" placeholder="タイトル・概要・URLなど" />
        </label>
        <label class="field">
          <span>国・地域</span>
          <select id="regionFilter">
            <option value="">すべて</option>
          </select>
        </label>
        <label class="field">
          <span>カテゴリ</span>
          <select id="categoryFilter">
            <option value="">すべて</option>
          </select>
        </label>
        <button id="reloadData" class="reload-button" type="button">再取得</button>
        <button id="resetFilters" class="reset-button" type="button">絞り込み解除</button>
      </section>

      <section class="result-summary" aria-live="polite">
        <p id="resultCount"></p>
        <p id="loadStatus" class="load-status"></p>
      </section>

      <section id="caseList" class="case-list" aria-label="事例一覧"></section>
      <p id="emptyState" class="empty-state" hidden>表示できる事例がありません。</p>
    </main>

    <template id="caseCardTemplate">
      <article class="case-card">
        <div class="case-card__thumbnail" data-field="thumbnail">
          <span>No image</span>
        </div>
        <div class="case-card__body">
          <div class="case-card__meta">
            <span class="pill" data-field="region"></span>
            <span class="pill pill--category" data-field="category"></span>
            <span class="pill pill--verification" data-field="verification" hidden></span>
          </div>
          <h2 data-field="title"></h2>
          <p class="case-card__summary" data-field="summary"></p>
          <div class="case-card__sources">
            <h3>出典リンク</h3>
            <div class="source-list" data-field="links"></div>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
