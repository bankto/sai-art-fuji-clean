<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>技術調査とリサーチ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main
      id="appRoot"
      class="page-shell"
      data-api-url="__RESEARCH_SITE_DATA_API_URL__"
    >
      <header class="site-header">
        <div class="site-header__inner">
          <h1 class="site-header__title">技術調査とリサーチ</h1>
          <p class="lead">
            廃棄物×クリエイティブの調査と、気になっている技術のメモ。スプレッドシートから事例を読み込み、一覧表示します。
          </p>

          <section class="interest-panel" aria-label="気になっている技術">
            <h2 class="interest-panel__heading">気になっている技術</h2>
            <ul class="interest-panel__chips">
              <li class="interest-panel__chip">ラズパイ</li>
              <li class="interest-panel__chip">NFC</li>
              <li class="interest-panel__chip">サーマル</li>
              <li class="interest-panel__chip">UV・レーザー</li>
              <li class="interest-panel__chip">重量センサー</li>
              <li class="interest-panel__chip">LEDマトリクス</li>
              <li class="interest-panel__chip">触覚UI（ゴミ）</li>
              <li class="interest-panel__chip">複数デバイス連携</li>
              <li class="interest-panel__chip">映像同期</li>
            </ul>
            <p class="interest-panel__note">体験の方向性：独自ローカルマップ+GPS / カメラ+AIゴミ判別 / 偶然性×規則性のジェネラティブ</p>
          </section>

          <dl class="data-meta">
            <div class="data-meta__row">
              <dt>最終取得</dt>
              <dd><time id="lastFetched">未取得</time></dd>
            </div>
          </dl>
        </div>
      </header>

      <section class="data-actions">
        <button id="reloadData" type="button" class="btn btn--primary">
          再取得
        </button>
      </section>

      <section class="result-summary" aria-live="polite">
        <p id="resultCount" class="result-summary__count"></p>
        <p id="loadStatus" class="load-status"></p>
      </section>

      <section id="caseList" class="case-list" aria-label="事例一覧"></section>

      <p id="emptyState" class="empty-state" hidden>
        表示できる事例がありません。
      </p>
    </main>

    <template id="caseCardTemplate">
      <article class="case-item">
        <div class="case-item__links" data-field="links"></div>
        <h2 class="case-item__title" data-field="title"></h2>
        <p class="case-item__summary" data-field="summary"></p>
        <div class="case-item__selection" data-field="selectionReasonBlock" hidden>
          <p class="case-item__selection-label">選定理由</p>
          <p class="case-item__selection-text" data-field="selectionReason"></p>
        </div>
        <p class="case-item__meta">
          <span data-field="region"></span>
          <span class="case-item__meta-sep" aria-hidden="true"> · </span>
          <span data-field="category"></span>
        </p>
        <p class="case-item__verification" data-field="verificationStatusBlock" hidden>
          <span class="case-item__verification-label">検証状態</span>
          <span data-field="verificationStatus"></span>
        </p>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
