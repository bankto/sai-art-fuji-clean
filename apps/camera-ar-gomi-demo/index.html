<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101312" />
    <title>camera-ar-gomi-demo</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Fuji Clean Prototype</p>
          <h1>camera-ar-gomi-demo</h1>
        </div>
        <div class="status-pill" id="app-status">M1-M2</div>
      </header>

      <main>
        <section class="view start-view" id="start-view">
          <div class="start-copy">
            <p class="eyebrow">Camera Recognition / Sound / Visual</p>
            <h2>対象物から作品を生成する</h2>
            <p>カメラ、端末内生成、URL/QR持ち帰りを確認します。</p>
          </div>
          <div class="action-row">
            <button class="primary-button" id="start-button" type="button">開始</button>
          </div>
          <p class="support-text">localhost または HTTPS で実行してください。iOS は Safari、Android は Chrome を優先します。</p>
        </section>

        <section class="view camera-view hidden" id="camera-view" aria-label="カメラ認識">
          <div class="camera-stage">
            <video id="camera-video" autoplay muted playsinline></video>
            <div class="camera-frame" aria-hidden="true"></div>
            <div class="recognition-badge">
              <span id="recognition-label">未認識</span>
              <strong id="recognition-confidence">0%</strong>
            </div>
          </div>

          <div class="control-band">
            <label class="field">
              <span>デモラベル</span>
              <select id="demo-label-select">
                <option value="アルミ片">アルミ片</option>
                <option value="廃プラスチック">廃プラスチック</option>
                <option value="紙くず">紙くず</option>
                <option value="未認識">未認識</option>
              </select>
            </label>
            <button class="secondary-button" id="recognize-button" type="button">認識更新</button>
            <button class="primary-button" id="generate-button" type="button">生成</button>
          </div>

          <p class="message" id="camera-message" role="status"></p>
        </section>

        <section class="view artwork-view hidden" id="artwork-view" aria-label="生成作品">
          <div class="artwork-layout">
            <div class="canvas-wrap">
              <canvas id="artwork-canvas" width="960" height="960"></canvas>
            </div>

            <div class="tool-panel">
              <div class="meta-grid">
                <div>
                  <span>対象</span>
                  <strong id="artwork-label">-</strong>
                </div>
                <div>
                  <span>Seed</span>
                  <strong id="seed-label">-</strong>
                </div>
                <div>
                  <span>Version</span>
                  <strong id="version-label">-</strong>
                </div>
              </div>

              <div class="transport-row">
                <button class="primary-button" id="play-button" type="button">再生</button>
                <button class="secondary-button" id="stop-button" type="button">停止</button>
                <label class="volume-control">
                  <span>音量</span>
                  <input id="volume-input" type="range" min="0" max="100" value="72" />
                </label>
              </div>

              <div class="action-row compact">
                <button class="secondary-button" id="regenerate-button" type="button">再生成</button>
                <button class="secondary-button" id="rescan-button" type="button">撮り直す</button>
                <button class="secondary-button" id="save-png-button" type="button">PNG保存</button>
              </div>
            </div>
          </div>

          <div class="share-band">
            <div>
              <p class="eyebrow">Takeaway</p>
              <h2>URL / QR</h2>
            </div>
            <canvas id="qr-canvas" width="256" height="256" aria-label="共有用QRコード"></canvas>
            <label class="share-url">
              <span>共有URL</span>
              <input id="share-url-input" type="text" readonly />
            </label>
            <button class="primary-button" id="copy-url-button" type="button">URLコピー</button>
          </div>
        </section>
      </main>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
